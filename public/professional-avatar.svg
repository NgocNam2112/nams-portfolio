<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDB182;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4A261;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shirtGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A202C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="80" cy="80" r="80" fill="url(#bgGradient)"/>
  
  <!-- Professional shirt/collar -->
  <path d="M40 140 Q50 120 80 120 Q110 120 120 140 L120 160 L40 160 Z" fill="url(#shirtGradient)"/>
  
  <!-- Collar -->
  <path d="M65 120 L80 135 L95 120 L90 125 L80 130 L70 125 Z" fill="#1A202C"/>
  
  <!-- Face -->
  <circle cx="80" cy="75" r="30" fill="url(#faceGradient)"/>
  
  <!-- Hair -->
  <path d="M50 55 Q50 35 80 35 Q110 35 110 55 Q105 45 80 45 Q55 45 50 55" fill="#2D3748"/>
  
  <!-- Eyes -->
  <circle cx="70" cy="70" r="3" fill="#2D3748"/>
  <circle cx="90" cy="70" r="3" fill="#2D3748"/>
  <circle cx="71" cy="69" r="1" fill="#FFFFFF"/>
  <circle cx="91" cy="69" r="1" fill="#FFFFFF"/>
  
  <!-- Eyebrows -->
  <path d="M65 63 Q70 60 75 63" stroke="#2D3748" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M85 63 Q90 60 95 63" stroke="#2D3748" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <circle cx="80" cy="78" r="1.5" fill="#E07A5F" opacity="0.6"/>
  
  <!-- Mouth -->
  <path d="M75 85 Q80 88 85 85" stroke="#2D3748" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Subtle shadow for depth -->
  <ellipse cx="80" cy="75" rx="28" ry="30" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1" opacity="0.3"/>
  
  <!-- Professional accent - glasses (optional) -->
  <rect x="62" y="66" width="36" height="12" rx="6" fill="none" stroke="#2D3748" stroke-width="2" opacity="0.7"/>
  <circle cx="70" cy="72" r="8" fill="none" stroke="#2D3748" stroke-width="2" opacity="0.7"/>
  <circle cx="90" cy="72" r="8" fill="none" stroke="#2D3748" stroke-width="2" opacity="0.7"/>
  <line x1="78" y1="72" x2="82" y2="72" stroke="#2D3748" stroke-width="2" opacity="0.7"/>
</svg> 